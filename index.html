<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Storybook Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&family=Baloo+2:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Baloo 2", cursive;
      }
      .font-amharic {
        font-family: "Noto Sans Ethiopic", sans-serif;
      }

      /* New background animation styles - Code-based */
      #space-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(
          ellipse at bottom,
          #1b2735 0%,
          #090a0f 100%
        );
        overflow: hidden;
        z-index: 0;
      }

      @keyframes animate-stars {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-2000px);
        }
      }

      .stars {
        position: absolute;
        top: 0;
        left: 0;
        background: transparent;
        animation-name: animate-stars;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        border-radius: 50%; /* Make the stars round */
      }

      .stars::after {
        content: " ";
        position: absolute;
        left: 0;
        top: 2000px;
        width: inherit;
        height: inherit;
        background: transparent;
        box-shadow: inherit;
        border-radius: inherit;
      }

      #stars1 {
        width: 1px;
        height: 1px;
        animation-duration: 150s;
        /* 25 Small stars */
        box-shadow:
          624px 1726px #fff,
          479px 134px #fff,
          1445px 338px #fff,
          792px 1391px #fff,
          1280px 1581px #fff,
          153px 439px #fff,
          883px 145px #fff,
          44px 1269px #fff,
          343px 1868px #fff,
          1374px 1195px #fff,
          1858px 57px #fff,
          1933px 184px #fff,
          825px 321px #fff,
          943px 1300px #fff,
          25px 982px #fff,
          1735px 441px #fff,
          149px 141px #fff,
          1029px 1109px #fff,
          1968px 1827px #fff,
          1372px 697px #fff,
          1365px 1974px #fff,
          126px 1238px #fff,
          431px 1916px #fff,
          1104px 182px #fff,
          1720px 840px #fff;
      }
      #stars2 {
        width: 2px;
        height: 2px;
        animation-duration: 100s;
        /* 15 Medium stars */
        box-shadow:
          1827px 1113px #fff,
          1228px 1014px #fff,
          495px 1492px #fff,
          248px 173px #fff,
          1437px 1324px #fff,
          506px 1485px #fff,
          1161px 649px #fff,
          1262px 1742px #fff,
          1166px 1974px #fff,
          102px 1499px #fff,
          1308px 233px #fff,
          1194px 1508px #fff,
          1832px 352px #fff,
          97px 670px #fff,
          622px 1865px #fff;
      }
      #stars3 {
        width: 3px;
        height: 3px;
        animation-duration: 50s;
        /* 10 Large stars */
        box-shadow:
          1008px 633px #fff,
          1729px 1292px #fff,
          107px 1486px #fff,
          102px 903px #fff,
          1004px 1650px #fff,
          117px 78px #fff,
          1858px 1459px #fff,
          1832px 1819px #fff,
          1698px 1313px #fff,
          1338px 1030px #fff;
      }

      @keyframes fly {
        0% {
          transform: translateY(20px) translateX(-20px) rotate(-5deg);
        }
        50% {
          transform: translateY(-20px) translateX(20px) rotate(5deg);
        }
        100% {
          transform: translateY(20px) translateX(-20px) rotate(-5deg);
        }
      }
      .spaceship {
        animation: fly 8s ease-in-out infinite;
        z-index: 2;
        position: absolute;
        bottom: 10%;
        left: 10%;
        width: 100px;
        height: 100px;
      }

      /* ============================================================
         HIGH-FIDELITY 3D BOOK STYLES
         Perspective is set on .book-container (the parent of .book)
         so that ALL leaves share one vanishing point — the spine.
         The translateX(50%) centers the book so the spine is in
         the middle of the container while pages flip right→left.
         ============================================================ */

      .book-container {
        width: 90vw;
        max-width: 1000px;
        height: 65vh;
        max-height: 600px;
        position: relative;
        /* Spec §1: perspective: 2000px on the main container */
        perspective: 2000px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .book {
        width: 100%;
        height: 100%;
        position: relative;
        /* Spec §1: transform-style: preserve-3d propagates to leaves */
        transform-style: preserve-3d;
        /* Spec §3: offset so spine stays centered while pages fly left */
        transform: translateX(0);
        /* Subtle book shadow */
        filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.35));
      }

      /* ── Book Spine (Spline) ─────────────────────────────────── */
      .book-spine {
        position: absolute;
        left: 50%;
        top: 0;
        width: 30px;
        height: 100%;
        background: linear-gradient(to right, 
          rgba(0,0,0,0.3) 0%, 
          rgba(0,0,0,0.1) 15%, 
          rgba(255,255,255,0.1) 50%, 
          rgba(0,0,0,0.1) 85%, 
          rgba(0,0,0,0.3) 100%
        ), #e2e8f0;
        transform: translateX(-50%) translateZ(-1px);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        z-index: 5;
      }

      /* ── Leaf (the flipping unit) ─────────────────────────────── */
      .paper {
        position: absolute;
        width: 50%;
        height: 100%;
        top: 0;
        right: 0;
        /* Spec §1: hinge is the left edge */
        transform-origin: left center;
        /* Spec §1: preserve-3d so front/back faces render in 3D space */
        transform-style: preserve-3d;
        border-radius: 0 10px 10px 0;
        /* NO CSS transition — everything driven by JS rAF physics */
        will-change: transform, clip-path;
      }

      /* ── Page faces ───────────────────────────────────────────── */
      .page-content {
        position: absolute;
        width: 100%;
        height: 100%;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        /* Warm paper colour */
        background-color: #fdfcf8;
        /* Subtle page lines */
        background-image:
          repeating-linear-gradient(
            transparent,
            transparent 31px,
            #e8e0d0 31px,
            #e8e0d0 32px
          );
        border: 1px solid #ddd4c0;
        overflow: hidden;
        /* Spec §1: backface-visibility: hidden so faces don't bleed */
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      .front {
        border-radius: 0 10px 10px 0;
        box-shadow:
          inset -6px 0 16px -8px rgba(0, 0, 0, 0.25),
          2px 0 8px -4px rgba(0, 0, 0, 0.15);
      }

      /* Spec §1: .back must be pre-rotated 180° so it faces the reader
         when the leaf is fully flipped (-180°)                        */
      .back {
        transform: rotateY(180deg);
        border-radius: 10px 0 0 10px;
        box-shadow:
          inset 6px 0 16px -8px rgba(0, 0, 0, 0.25),
          -2px 0 8px -4px rgba(0, 0, 0, 0.15);
      }

      /* ── Left-hand static page (the "already read" stack) ──────── */
      .back-cover {
        position: absolute;
        width: 50%;
        height: 100%;
        top: 0;
        left: 0;
        background-color: #fdfcf8;
        background-image:
          repeating-linear-gradient(
            transparent,
            transparent 31px,
            #e8e0d0 31px,
            #e8e0d0 32px
          );
        border: 1px solid #ddd4c0;
        border-radius: 10px 0 0 10px;
        box-shadow: inset 6px 0 16px -8px rgba(0,0,0,0.2);
      }

      /* ── Navigation buttons ───────────────────────────────────── */
      .nav-button {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        font-weight: bold;
        padding: 0.75rem 2rem;
        border-radius: 10px;
        transition: all 0.25s ease;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        letter-spacing: 0.02em;
      }
      .nav-button:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
      }
      .nav-button:disabled {
        background: linear-gradient(135deg, #94a3b8, #718096);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* === INTERACTIVE ANIMATIONS === */
      @keyframes glow {
        0%,
        100% {
          text-shadow:
            0 0 3px #fde047,
            0 0 6px #facc15;
          color: #ca8a04;
        }
        50% {
          text-shadow:
            0 0 8px #fde047,
            0 0 12px #facc15;
          color: #f59e0b;
        }
      }
      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-3px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(3px);
        }
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .interactive-word {
        display: inline-block;
        font-weight: 700;
        cursor: pointer;
        color: #0284c7; /* sky-600 */
        animation-duration: 1.5s;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
        animation-play-state: paused;
      }
      .is-reading .interactive-word {
        animation-play-state: running;
      }
      .play-animation {
        animation-name: var(--animation-name);
        animation-play-state: running !important;
      }

      .animate-glow {
        --animation-name: glow;
        animation-name: glow;
      }
      .animate-bounce {
        --animation-name: bounce;
        animation-name: bounce;
      }
      .animate-shake {
        --animation-name: shake;
        animation-name: shake;
      }
      .animate-spin {
        --animation-name: spin;
        animation-name: spin;
      }
      .animate-float {
        --animation-name: float;
        animation-name: float;
      }

      /* Print styles */
      @media print {
        @page {
          size: landscape;
          margin: 1cm;
        }
        body {
          background: white !important;
          margin: 0;
          padding: 0;
          visibility: hidden;
        }
        #printable-area {
          visibility: visible;
          display: block !important;
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
        }
        #printable-area * {
          visibility: visible;
        }
        .no-print,
        #space-container,
        .spaceship,
        .book-container,
        .nav-button {
          display: none !important;
        }
        .print-spread {
          display: flex !important;
          width: 100%;
          height: 100vh;
          page-break-after: always;
          padding: 1cm;
          box-sizing: border-box;
          gap: 2cm;
          align-items: center;
          justify-content: center;
          background: white !important;
        }
        .cover-print {
          flex-direction: column !important;
          justify-content: center !important;
        }
        .page-print {
          flex: 1;
          display: flex !important;
          flex-direction: column;
          align-items: center;
          text-align: center;
          max-height: 100%;
        }
        .page-print img {
          max-width: 100%;
          max-height: 65%;
          object-fit: contain;
          border-radius: 1rem;
          margin-bottom: 1.5rem;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .page-print p {
          font-size: 1.5rem;
          line-height: 1.6;
          color: #1e293b;
          margin: 0;
          max-width: 90%;
        }
        .cover-page h1 {
          font-size: 4rem;
          margin-bottom: 2rem;
        }
      }
    </style>
    <!-- Removed non-standard importmap to allow Vite to handle module resolution -->
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
