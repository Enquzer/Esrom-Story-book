
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Storybook Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Baloo 2', cursive;
      }
      .font-amharic {
        font-family: 'Noto Sans Ethiopic', sans-serif;
      }
      
      /* New background animation styles - Code-based */
      #space-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        overflow: hidden;
        z-index: 0;
      }

      @keyframes animate-stars {
        from { transform: translateY(0); }
        to { transform: translateY(-2000px); }
      }

      .stars {
        position: absolute;
        top: 0;
        left: 0;
        background: transparent;
        animation-name: animate-stars;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        border-radius: 50%; /* Make the stars round */
      }

      .stars::after {
        content: " ";
        position: absolute;
        left: 0;
        top: 2000px;
        width: inherit;
        height: inherit;
        background: transparent;
        box-shadow: inherit;
        border-radius: inherit;
      }

      #stars1 {
        width: 1px;
        height: 1px;
        animation-duration: 150s;
        /* 25 Small stars */
        box-shadow: 624px 1726px #FFF, 479px 134px #FFF, 1445px 338px #FFF, 792px 1391px #FFF, 1280px 1581px #FFF, 153px 439px #FFF, 883px 145px #FFF, 44px 1269px #FFF, 343px 1868px #FFF, 1374px 1195px #FFF, 1858px 57px #FFF, 1933px 184px #FFF, 825px 321px #FFF, 943px 1300px #FFF, 25px 982px #FFF, 1735px 441px #FFF, 149px 141px #FFF, 1029px 1109px #FFF, 1968px 1827px #FFF, 1372px 697px #FFF, 1365px 1974px #FFF, 126px 1238px #FFF, 431px 1916px #FFF, 1104px 182px #FFF, 1720px 840px #FFF;
      }
      #stars2 {
        width: 2px;
        height: 2px;
        animation-duration: 100s;
        /* 15 Medium stars */
        box-shadow: 1827px 1113px #FFF, 1228px 1014px #FFF, 495px 1492px #FFF, 248px 173px #FFF, 1437px 1324px #FFF, 506px 1485px #FFF, 1161px 649px #FFF, 1262px 1742px #FFF, 1166px 1974px #FFF, 102px 1499px #FFF, 1308px 233px #FFF, 1194px 1508px #FFF, 1832px 352px #FFF, 97px 670px #FFF, 622px 1865px #FFF;
      }
      #stars3 {
        width: 3px;
        height: 3px;
        animation-duration: 50s;
        /* 10 Large stars */
        box-shadow: 1008px 633px #FFF, 1729px 1292px #FFF, 107px 1486px #FFF, 102px 903px #FFF, 1004px 1650px #FFF, 117px 78px #FFF, 1858px 1459px #FFF, 1832px 1819px #FFF, 1698px 1313px #FFF, 1338px 1030px #FFF;
      }

      @keyframes fly {
        0% { transform: translateY(20px) translateX(-20px) rotate(-5deg); }
        50% { transform: translateY(-20px) translateX(20px) rotate(5deg); }
        100% { transform: translateY(20px) translateX(-20px) rotate(-5deg); }
      }
      .spaceship {
        animation: fly 8s ease-in-out infinite;
        z-index: 2;
        position: absolute;
        bottom: 10%;
        left: 10%;
        width: 100px;
        height: 100px;
      }

      /* === NEW BOOK LAYOUT STYLES === */
      .book-container {
        width: 90vw;
        max-width: 1000px;
        height: 65vh;
        max-height: 600px;
        position: relative;
        perspective: 2500px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .book {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
      }
      
      .paper {
        position: absolute;
        width: 50%;
        height: 100%;
        top: 0;
        right: 0;
        transform-origin: left center;
        transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        transform-style: preserve-3d;
        border-radius: 0 8px 8px 0;
      }
      
      .paper.flipped {
        transform: rotateY(-180deg);
      }

      .page-content {
        position: absolute;
        width: 100%;
        height: 100%;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        background-color: #f8fafc; /* slate-50 */
        border: 1px solid #e2e8f0; /* slate-200 */
        backface-visibility: hidden;
        overflow: hidden;
      }
      
      .front {
        border-radius: 0 8px 8px 0;
        box-shadow: inset -3px 0px 10px -7px rgba(0,0,0,0.3);
      }
      
      .back {
        transform: rotateY(180deg);
        border-radius: 8px 0 0 8px;
        box-shadow: inset 3px 0px 10px -7px rgba(0,0,0,0.3);
      }
      
      .back-cover {
        position: absolute;
        width: 50%;
        height: 100%;
        top: 0;
        left: 0;
        background-color: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px 0 0 8px;
      }
      
      .nav-button {
        background-color: #2563eb; /* blue-600 */
        color: white;
        font-weight: bold;
        padding: 0.75rem 2rem;
        border-radius: 8px;
        transition: all 0.3s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .nav-button:hover {
        background-color: #1d4ed8; /* blue-700 */
        transform: translateY(-2px);
      }
      .nav-button:disabled {
        background-color: #94a3b8; /* slate-400 */
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* === INTERACTIVE ANIMATIONS === */
      @keyframes glow {
        0%, 100% { text-shadow: 0 0 3px #fde047, 0 0 6px #facc15; color: #ca8a04; }
        50% { text-shadow: 0 0 8px #fde047, 0 0 12px #facc15; color: #f59e0b; }
      }
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
        60% { transform: translateY(-5px); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
        20%, 40%, 60%, 80% { transform: translateX(3px); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      .interactive-word {
        display: inline-block;
        font-weight: 700;
        cursor: pointer;
        color: #0284c7; /* sky-600 */
        animation-duration: 1.5s;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
        animation-play-state: paused;
      }
      .is-reading .interactive-word {
        animation-play-state: running;
      }
      .play-animation {
        animation-name: var(--animation-name);
        animation-play-state: running !important;
      }

      .animate-glow { --animation-name: glow; animation-name: glow; }
      .animate-bounce { --animation-name: bounce; animation-name: bounce; }
      .animate-shake { --animation-name: shake; animation-name: shake; }
      .animate-spin { --animation-name: spin; animation-name: spin; }
      .animate-float { --animation-name: float; animation-name: float; }

      /* Print styles */
      @media print {
        @page {
          size: landscape;
          margin: 1cm;
        }
        body {
          background: white !important;
          margin: 0;
          padding: 0;
          visibility: hidden;
        }
        #printable-area {
          visibility: visible;
          display: block !important;
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
        }
        #printable-area * {
          visibility: visible;
        }
        .no-print, #space-container, .spaceship, .book-container, .nav-button {
          display: none !important;
        }
        .print-spread {
          display: flex !important;
          width: 100%;
          height: 100vh;
          page-break-after: always;
          padding: 1cm;
          box-sizing: border-box;
          gap: 2cm;
          align-items: center;
          justify-content: center;
          background: white !important;
        }
        .cover-print {
          flex-direction: column !important;
          justify-content: center !important;
        }
        .page-print {
          flex: 1;
          display: flex !important;
          flex-direction: column;
          align-items: center;
          text-align: center;
          max-height: 100%;
        }
        .page-print img {
          max-width: 100%;
          max-height: 65%;
          object-fit: contain;
          border-radius: 1rem;
          margin-bottom: 1.5rem;
          box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .page-print p {
          font-size: 1.5rem;
          line-height: 1.6;
          color: #1e293b;
          margin: 0;
          max-width: 90%;
        }
        .cover-page h1 {
          font-size: 4rem;
          margin-bottom: 2rem;
        }
      }
    </style>
